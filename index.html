<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Site Title -->
    <title>ManifiX AI</title>

    <!-- Fonts used across the app (Cinzel, Inter, JetBrains Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />

    <!-- Favicons & App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="ManifiX AI — a biometric-aware wellness and personal finance platform that helps you build calmer habits and protect your money." />

    <!-- Theme color -->
    <meta name="theme-color" content="#08070a" />

    <!-- Open Graph (Social Media Cards) -->
    <meta property="og:title" content="ManifiX AI" />
    <meta property="og:description" content="Wellness and personal finance, connected. Build calmer habits and protect your money with ManifiX AI." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.manifixai.com" />
    <meta property="og:image" content="https://www.manifixai.com/web-app-manifest-512x512.png" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ManifiX AI" />
    <meta name="twitter:description" content="Wellness and personal finance, connected. Build calmer habits and protect your money with ManifiX AI." />
    <meta name="twitter:image" content="https://www.manifixai.com/web-app-manifest-512x512.png" />

    <!-- Structured SEO Schema Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "ManifiX AI",
        "url": "https://www.manifixai.com",
        "applicationCategory": "LifestyleApplication",
        "operatingSystem": "Web",
        "logo": "https://www.manifixai.com/web-app-manifest-512x512.png"
      }
    </script>
  </head>
  <body>
    <!-- React Main Root Mounting Node -->
    <div id="root"></div>
    <!-- React Bundled Application Entry Point Module -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
