<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Veggie Go</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <meta name="description" content="Veggie Go — a live AR camera party game. Scan in, claim your slot, and chase runaway veggies around your real room with up to 6 squad members." />
  <meta name="theme-color" content="#080808" />

  <meta property="og:title" content="ManifiX AI: Veggie Go" />
  <meta property="og:description" content="A live AR camera party game for up to 6 players. Chase runaway veggies around your real room and steal points from your squad." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://manifixai.com" />
  <meta property="og:image" content="https://manifixai.com/web-app-manifest-512x512.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ManifiX AI: Veggie Go" />
  <meta name="twitter:description" content="A live AR camera party game for up to 6 players. Chase runaway veggies around your real room and steal points from your squad." />
  <meta name="twitter:image" content="https://manifixai.com/web-app-manifest-512x512.png" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "ManifiX AI: Veggie Go",
    "url": "https://manifixai.com",
    "applicationCategory": "GameApplication",
    "operatingSystem": "Web, Android, iOS",
    "genre": "Augmented Reality Party Game",
    "logo": "https://manifixai.com/web-app-manifest-512x512.png"
  }
  </script>

  <style>
    :root {
      --bg-black: #080808;
      --bg-black-deep: #040508;
      --gold: #ffc83c;
      --gold-2: #ffbe1a;
      --green: #39ff88;
      --pink: #ff3b94;
      --glass: rgba(8, 8, 8, 0.82);
      --border-glow: rgba(57, 255, 136, 0.35);
      --text-dim: rgba(255, 255, 255, 0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      background-color: var(--bg-black);
      color: #ffffff;
      font-family: 'DM Mono', monospace;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
    }

    /* Ambient background — fixed so it never clips scrollable content */
    .neon-grid-canvas-overlay {
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(57, 255, 136, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(57, 255, 136, 0.05) 1px, transparent 1px);
      background-size: 30px 30px;
      z-index: 0;
      pointer-events: none;
      animation: gridDrift 18s linear infinite;
    }
    @keyframes gridDrift {
      0%   { background-position: 0px 0px; }
      100% { background-position: 30px 30px; }
    }

    .ambient-halo-glow-top {
      position: fixed;
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, rgba(255, 200, 60, 0.10) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
      animation: haloPulse 4s ease-in-out infinite;
    }
    @keyframes haloPulse {
      0%, 100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    .manifix-portal-hub-card {
      position: relative;
      text-align: center;
      background: var(--glass);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-glow);
      box-shadow: 0 0 35px rgba(57, 255, 136, 0.15);
      padding: 40px 28px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      z-index: 10;
      opacity: 0;
      animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) 0.1s forwards;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .manifix-portal-hub-card > * {
      opacity: 0;
      animation: contentRise 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .manifix-portal-hub-card > *:nth-child(1) { animation-delay: 0.28s; }
    .manifix-portal-hub-card > *:nth-child(2) { animation-delay: 0.4s; }
    .manifix-portal-hub-card > *:nth-child(3) { animation-delay: 0.52s; }
    .manifix-portal-hub-card > *:nth-child(4) { animation-delay: 0.64s; }
    .manifix-portal-hub-card > *:nth-child(5) { animation-delay: 0.76s; }
    @keyframes contentRise {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .vector-brand-frame {
      position: relative;
      width: 108px;
      height: 108px;
      margin: 0 auto 22px auto;
    }
    .scanner-ring {
      position: absolute;
      inset: 0;
      border: 2px dashed var(--green);
      border-radius: 50%;
      animation: spinRing 14s linear infinite;
    }
    @keyframes spinRing { 100% { transform: rotate(360deg); } }

    .vector-brand-frame img {
      position: absolute;
      inset: 10px;
      width: calc(100% - 20px);
      height: calc(100% - 20px);
      object-fit: contain;
      background: var(--bg-black-deep);
      border: 2px solid var(--gold);
      border-radius: 50%;
      padding: 14px;
      box-shadow: 0 0 20px rgba(255, 190, 26, 0.25);
    }

    .manifix-portal-hub-card h2 {
      font-family: 'Bebas Neue', sans-serif;
      color: var(--gold);
      font-size: 24px;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      text-shadow: 0 0 10px rgba(255, 200, 60, 0.25);
    }

    .manifix-portal-hub-card p {
      color: var(--text-dim);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .cyber-distribution-btn {
      display: block;
      width: 100%;
      background: var(--gold);
      color: var(--bg-black-deep);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 15px;
      letter-spacing: 1px;
      padding: 16px 20px;
      text-decoration: none;
      border-radius: 8px;
      box-shadow: 0 0 25px rgba(255, 190, 26, 0.35);
      text-transform: uppercase;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }
    .cyber-distribution-btn:hover {
      box-shadow: 0 0 32px rgba(255, 190, 26, 0.55);
    }
    .cyber-distribution-btn:active {
      transform: scale(0.97);
      box-shadow: 0 0 15px rgba(255, 190, 26, 0.3);
    }
    .cyber-distribution-btn:focus-visible {
      outline: 2px solid var(--green);
      outline-offset: 3px;
    }

    .system-performance-badge {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 1.5px;
      color: var(--text-dim);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 4px 12px;
      border-radius: 20px;
      margin-top: 18px;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>

  <div class="neon-grid-canvas-overlay" aria-hidden="true"></div>
  <div class="ambient-halo-glow-top" aria-hidden="true"></div>

  <div class="manifix-portal-hub-card">
    <div class="vector-brand-frame">
      <div class="scanner-ring" aria-hidden="true"></div>
      <img src="/logo.png" alt="Veggie Go logo" onerror="this.style.display='none'" />
    </div>

    <h2>Veggie Go is live</h2>
    <p>Get the direct installer — no app store needed — and jump onto the map with your squad.</p>

    <a
      id="apk-download-link"
      href="/app-release.apk"
      class="cyber-distribution-btn"
      download="VeggieGo.apk"
      target="_blank"
      rel="noopener"
    >
      Download for Android (.apk)
    </a>

    <span class="system-performance-badge">BETA BUILD</span>
  </div>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>
</html>
