<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile Responsive & Touch Zoom Prevention for Circle Party Play -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Game Title -->
    <title>ManifiX AI: Veggie Go | Gold Arcade</title>


    <!-- Premium Game Fonts (Fredoka, Nunito, JetBrains Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Favicons & App Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- MANIFEST DISABLED TEMPORARILY -->
    <!--
    <link rel="manifest" href="/site.webmanifest" />
    -->

    <!-- SEO Meta Tags -->
    <meta name="description" content="Oggy's Veggie Hunt - Premium Multiplayer Cyber Arcade Room Game" />
    
    <!-- Gold & Black Cyber Theme Sync -->
    <meta name="theme-color" content="#08080a" />

    <!-- Open Graph (Social Media Cards) -->
    <meta property="og:title" content="Oggy's Veggie Hunt" />
    <meta property="og:description" content="Join your circle of friends in an addictive, real-time cyber veggie race." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.manifixai.com" />
    <meta property="og:image" content="https://www.manifixai.com/web-app-manifest-512x512.png" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Oggy's Veggie Hunt" />
    <meta name="twitter:description" content="Join your circle of friends in an addictive, real-time cyber veggie race." />
    <meta name="twitter:image" content="https://www.manifixai.com/web-app-manifest-512x512.png" />

    <!-- Structured SEO Schema Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Oggy's Veggie Hunt",
        "url": "https://www.manifixai.com",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "logo": "https://www.manifixai.com/web-app-manifest-512x512.png"
      }
    </script>

    <!-- Razorpay Payment Integration -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  </head>

  <body>
    <!-- React Main Root Mounting Node -->
    <div id="root"></div>

    <!-- React Bundled Application Entry Point Module -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
