<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="radarSweepGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffbe1a" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffbe1a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Outer rings -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#ffbe1a" stroke-opacity="0.25" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#ffbe1a" stroke-opacity="0.4" stroke-width="1.5"/>
  <circle cx="32" cy="32" r="12" fill="none" stroke="#ffbe1a" stroke-opacity="0.6" stroke-width="1.5"/>

  <!-- Crosshair -->
  <line x1="32" y1="4" x2="32" y2="60" stroke="#ffbe1a" stroke-opacity="0.15" stroke-width="1"/>
  <line x1="4" y1="32" x2="60" y2="32" stroke="#ffbe1a" stroke-opacity="0.15" stroke-width="1"/>

  <!-- Sweep wedge -->
  <path d="M32,32 L32,4 A28,28 0 0,1 51.8,12.2 Z" fill="url(#radarSweepGrad)"/>
  <line x1="32" y1="32" x2="32" y2="4" stroke="#ffc83c" stroke-width="2" stroke-linecap="round"/>

  <!-- Blips -->
  <circle cx="42" cy="20" r="2.4" fill="#39ff88"/>
  <circle cx="20" cy="40" r="2" fill="#39ff88" opacity="0.7"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#ffc83c"/>

  <!-- Outer casing -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#ffc83c" stroke-width="2"/>
</svg>
