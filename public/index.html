<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#080808" />
    <meta name="description" content="ManifiX — AI Automation Platform" />

    <!-- Favicon — place favicon.ico in /public folder -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <title>ManifiX</title>

    <style>
      /* Base reset — React root fills the screen */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html, body, #root {
        height: 100%;
        width: 100%;
      }

      body {
        background: #080808;
        color: #ffffff;
        font-family: 'DM Mono', monospace;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Loading state shown before React mounts */
      #root:empty::after {
        content: 'MANIFIX';
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px;
        letter-spacing: 0.3em;
        color: rgba(212, 175, 55, 0.5);
        animation: pulse 1.4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.3; }
        50%       { opacity: 0.8; }
      }

      /* Scrollbar — dark gold theme */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #0e0e0e; }
      ::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(212,175,55,0.55); }

      /* Selection highlight */
      ::selection {
        background: rgba(212,175,55,0.25);
        color: #fff;
      }
    </style>
  </head>

  <body>
    <!-- React mounts here -->
    <div id="root"></div>

    <!-- Vite / CRA entry point -->
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
